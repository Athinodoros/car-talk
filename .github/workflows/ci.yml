name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

      - name: Run integration tests
        run: npm run test:int --if-present

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    # NOTE: E2E integration tests (integration_test/) are NOT run in CI.
    # They require a running backend (Fastify + PostgreSQL) and are designed
    # for manual local testing. To run them locally:
    #   1. Start the backend: DOCKER_HOST=tcp://192.168.1.164:2375 docker compose up -d
    #   2. Run: cd mobile && flutter test integration_test/app_test.dart

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Static analysis
        run: flutter analyze

      - name: Run widget tests
        run: flutter test
