name: car_post_all
description: >-
  Car Post All lets drivers leave and read messages attached to any car
  using its license plate. Send a note, get replies, and connect on the road.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: any
  flutter_riverpod: any
  riverpod_annotation: any
  freezed_annotation: any
  json_annotation: any
  dio: any
  socket_io_client: any
  flutter_secure_storage: any
  connectivity_plus: any
  package_info_plus: any
  intl: any
  google_mobile_ads: any
  firebase_core: any
  firebase_messaging: any
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: any
  build_runner: any
  freezed: any
  json_serializable: any
  riverpod_generator: any
  custom_lint: any
  riverpod_lint: any
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#121212"
  image: "assets/icon/app_icon.png"
  android_12:
    color: "#FFFFFF"
    color_dark: "#121212"
    image: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
